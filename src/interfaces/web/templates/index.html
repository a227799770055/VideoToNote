<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoToNote - 影片轉錄與筆記生成</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="file"], select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input[type="text"]:focus, input[type="file"]:focus, select:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            background: #3498db;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            margin-top: 10px;
        }
        button:hover {
            background: #2980b9;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        .checkbox-group input {
            width: auto;
            margin-right: 10px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #ddd;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: #f8f9fa;
            border: none;
            cursor: pointer;
            margin-right: 5px;
            border-radius: 5px 5px 0 0;
        }
        .tab.active {
            background: #3498db;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VideoToNote</h1>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">
            YouTube 影片轉錄與筆記生成工具
        </p>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('youtube')">YouTube 影片</button>
            <button class="tab" onclick="switchTab('audio')">本地音檔</button>
        </div>

        <!-- YouTube 影片處理 -->
        <div id="youtube-tab" class="tab-content active">
            <form id="youtube-form">
                <div class="form-group">
                    <label for="youtube-url">YouTube 影片連結：</label>
                    <input type="text" id="youtube-url" name="url" placeholder="https://www.youtube.com/watch?v=..." required>
                </div>
                
                <div class="form-group">
                    <label for="youtube-model">AI 模型選擇：</label>
                    <select id="youtube-model" name="model">
                        <option value="openai">OpenAI GPT-4o-mini</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="ollama">Ollama (本地)</option>
                    </select>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="youtube-keep-audio" name="keep_audio">
                    <label for="youtube-keep-audio">保留下載的音檔</label>
                </div>
                
                <button type="submit">開始處理</button>
            </form>
        </div>

        <!-- 本地音檔處理 -->
        <div id="audio-tab" class="tab-content">
            <form id="audio-form">
                <div class="form-group">
                    <label for="audio-file">選擇音檔：</label>
                    <input type="file" id="audio-file" name="audio" accept="audio/*" required>
                </div>
                
                <div class="form-group">
                    <label for="audio-model">AI 模型選擇：</label>
                    <select id="audio-model" name="model">
                        <option value="openai">OpenAI GPT-4o-mini</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="ollama">Ollama (本地)</option>
                    </select>
                </div>
                
                <button type="submit">開始處理</button>
            </form>
        </div>

        <!-- 載入動畫 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>處理中，請稍候...</p>
        </div>

        <!-- 結果顯示 -->
        <div id="result" class="result"></div>
    </div>

    <script>
        function switchTab(tab) {
            // 隱藏所有分頁內容
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // 移除所有分頁按鈕的 active 狀態
            document.querySelectorAll('.tab').forEach(button => {
                button.classList.remove('active');
            });
            
            // 顯示選中的分頁內容
            document.getElementById(tab + '-tab').classList.add('active');
            
            // 添加選中分頁按鈕的 active 狀態
            event.target.classList.add('active');
            
            // 隱藏結果
            document.getElementById('result').style.display = 'none';
        }

        function showResult(message, isSuccess) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result ' + (isSuccess ? 'success' : 'error');
            resultDiv.innerHTML = message;
            resultDiv.style.display = 'block';
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // YouTube 表單處理
        document.getElementById('youtube-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            showLoading();
            
            const formData = new FormData(e.target);
            const data = {
                url: formData.get('url'),
                model: formData.get('model'),
                keep_audio: formData.get('keep_audio') === 'on'
            };
            
            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showResult('✅ ' + result.message, true);
                } else {
                    showResult('❌ ' + result.error, false);
                }
            } catch (error) {
                showResult('❌ 網路錯誤：' + error.message, false);
            } finally {
                hideLoading();
            }
        });

        // 音檔表單處理
        document.getElementById('audio-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            showLoading();
            
            const formData = new FormData(e.target);
            
            try {
                const response = await fetch('/process_audio', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showResult('✅ ' + result.message, true);
                } else {
                    showResult('❌ ' + result.error, false);
                }
            } catch (error) {
                showResult('❌ 網路錯誤：' + error.message, false);
            } finally {
                hideLoading();
            }
        });
    </script>
</body>
</html>
